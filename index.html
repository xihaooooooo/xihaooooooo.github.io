<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>远山 · 博客</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: #0a0e1a;
    color: #d9dce3;
    line-height: 1.8;
  }

  /* ─── hero ─── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(
      180deg,
      #0f1729 0%,
      #16203a 25%,
      #1b2a4a 45%,
      #2f4b6e 60%,
      #5b7da0 72%,
      #9bb7d4 82%,
      #e8d5b8 91%,
      #f5e6d0 96%,
      #faf0e4 100%
    );
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(255,220,180,0.12) 0%, transparent 60%);
    animation: breathe-light 6s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }

  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(155,183,212,0.08) 0%, transparent 50%);
    animation: breathe-light 8s ease-in-out infinite reverse;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes breathe-light {
    0%, 100% { opacity: 0.15; }
    50%      { opacity: 1; }
  }

  /* ─── mountains ─── */
  .mountains {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 70%;
    pointer-events: none;
  }

  .mountain-layer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .mountain-layer svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .mountain-layer:nth-child(1) { animation: breathe-mtn-1 10s ease-in-out infinite; transform-origin: bottom center; }
  .mountain-layer:nth-child(2) { animation: breathe-mtn-2 12s ease-in-out infinite; transform-origin: bottom center; }
  .mountain-layer:nth-child(3) { animation: breathe-mtn-1 14s ease-in-out infinite; transform-origin: bottom center; }
  .mountain-layer:nth-child(4) { animation: breathe-mtn-2 16s ease-in-out infinite; transform-origin: bottom center; }
  .mountain-layer:nth-child(5) { animation: breathe-mtn-1 18s ease-in-out infinite; transform-origin: bottom center; }

  @keyframes breathe-mtn-1 {
    0%, 100% { transform: scaleY(1) scaleX(1) translateY(0); }
    50%      { transform: scaleY(1.03) scaleX(1.006) translateY(-8px); }
  }

  @keyframes breathe-mtn-2 {
    0%, 100% { transform: scaleY(1) scaleX(1) translateY(0); }
    50%      { transform: scaleY(1.025) scaleX(1.004) translateY(-6px); }
  }

  /* ─── mist ─── */
  .mist {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }

  .mist-particle {
    position: absolute;
    bottom: 20%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
    animation: drift var(--d, 20s) ease-in-out infinite;
    animation-delay: var(--dd, 0s);
    opacity: 0;
  }

  .mist-particle:nth-child(1) { left: -5%; --d: 22s; --dd: 0s; width: 180px; height: 50px; }
  .mist-particle:nth-child(2) { left: 10%; --d: 28s; --dd: 3s; width: 140px; height: 40px; }
  .mist-particle:nth-child(3) { left: 30%; --d: 25s; --dd: 7s; width: 200px; height: 60px; }
  .mist-particle:nth-child(4) { left: 55%; --d: 30s; --dd: 2s; width: 160px; height: 45px; }
  .mist-particle:nth-child(5) { left: 75%; --d: 24s; --dd: 5s; width: 190px; height: 55px; }
  .mist-particle:nth-child(6) { left: 90%; --d: 26s; --dd: 10s; width: 150px; height: 40px; }

  @keyframes drift {
    0%   { transform: translateX(-100px) scaleX(0.8); opacity: 0; }
    10%  { opacity: 0.8; }
    80%  { opacity: 0.6; }
    100% { transform: translateX(calc(100vw + 200px)) scaleX(1.2); opacity: 0; }
  }

  /* ─── specks ─── */
  .specks {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }

  .speck {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    animation: float-speck var(--sd, 12s) ease-in-out infinite;
    animation-delay: var(--sdd, 0s);
    opacity: 0;
  }

  .speck:nth-child(1)  { top: 15%; left: 20%; --sd: 14s; --sdd: 0s; width: 3px; height: 3px; }
  .speck:nth-child(2)  { top: 35%; left: 45%; --sd: 18s; --sdd: 2s; width: 2px; height: 2px; }
  .speck:nth-child(3)  { top: 20%; left: 70%; --sd: 12s; --sdd: 5s; width: 3px; height: 3px; }
  .speck:nth-child(4)  { top: 50%; left: 15%; --sd: 16s; --sdd: 1s; width: 2px; height: 2px; }
  .speck:nth-child(5)  { top: 40%; left: 85%; --sd: 13s; --sdd: 7s; width: 4px; height: 4px; }
  .speck:nth-child(6)  { top: 10%; left: 50%; --sd: 20s; --sdd: 3s; width: 2px; height: 2px; }
  .speck:nth-child(7)  { top: 60%; left: 35%; --sd: 15s; --sdd: 9s; width: 3px; height: 3px; }
  .speck:nth-child(8)  { top: 25%; left: 90%; --sd: 17s; --sdd: 4s; width: 2px; height: 2px; }
  .speck:nth-child(9)  { top: 45%; left: 60%; --sd: 11s; --sdd: 6s; width: 3px; height: 3px; }
  .speck:nth-child(10) { top: 5%;  left: 10%; --sd: 19s; --sdd: 8s; width: 2px; height: 2px; }

  @keyframes float-speck {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translateY(-120px) translateX(30px); opacity: 0; }
  }

  /* ─── swans ─── */
  .swans {
    position: absolute;
    top: 22%;
    left: 0;
    width: 100%;
    height: 30%;
    pointer-events: none;
    z-index: 3;
  }

  .swan {
    position: absolute;
    opacity: 0.92;
  }

  .swan-1 { top: 10%; left: 12%; width: 6%; animation: float-swan-1 8s ease-in-out infinite; }
  .swan-2 { top: 25%; left: 30%; width: 5.5%; transform: scaleX(-1); animation: float-swan-2 10s ease-in-out infinite; }
  .swan-3 { top: 5%;  left: 48%; width: 7%; animation: float-swan-3 7s ease-in-out infinite; }
  .swan-4 { top: 30%; left: 62%; width: 5%; transform: scaleX(-1); animation: float-swan-4 11s ease-in-out infinite; }
  .swan-5 { top: 15%; left: 78%; width: 6%; animation: float-swan-5 9s ease-in-out infinite; }

  @keyframes float-swan-1 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-14px) rotate(1deg); }
    50%      { transform: translateY(-4px) rotate(-0.8deg); }
    75%      { transform: translateY(-18px) rotate(1.2deg); }
  }

  @keyframes float-swan-2 {
    0%, 100% { transform: scaleX(-1) translateY(0) rotate(0deg); }
    30%      { transform: scaleX(-1) translateY(-16px) rotate(-1.2deg); }
    60%      { transform: scaleX(-1) translateY(-5px) rotate(0.6deg); }
    80%      { transform: scaleX(-1) translateY(-20px) rotate(-1deg); }
  }

  @keyframes float-swan-3 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    20%      { transform: translateY(-12px) rotate(1.2deg); }
    55%      { transform: translateY(-18px) rotate(-1deg); }
    85%      { transform: translateY(-5px) rotate(0.6deg); }
  }

  @keyframes float-swan-4 {
    0%, 100% { transform: scaleX(-1) translateY(0) rotate(0deg); }
    35%      { transform: scaleX(-1) translateY(-15px) rotate(0.8deg); }
    65%      { transform: scaleX(-1) translateY(-20px) rotate(-1.2deg); }
    90%      { transform: scaleX(-1) translateY(-6px) rotate(0.8deg); }
  }

  @keyframes float-swan-5 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-16px) rotate(-1deg); }
    50%      { transform: translateY(-6px) rotate(0.6deg); }
    75%      { transform: translateY(-20px) rotate(1.2deg); }
  }

  .swan svg {
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 2px 12px rgba(255,255,255,0.15));
  }

  .swan-1 svg { animation: wing-flutter-1 3.2s ease-in-out infinite; transform-origin: center 40%; }
  .swan-2 svg { animation: wing-flutter-2 3.8s ease-in-out infinite; transform-origin: center 40%; }
  .swan-3 svg { animation: wing-flutter-3 2.9s ease-in-out infinite; transform-origin: center 40%; }
  .swan-4 svg { animation: wing-flutter-4 4.1s ease-in-out infinite; transform-origin: center 40%; }
  .swan-5 svg { animation: wing-flutter-5 3.5s ease-in-out infinite; transform-origin: center 40%; }

  @keyframes wing-flutter-1 {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    40%      { transform: scaleX(0.94) scaleY(1.02); }
    70%      { transform: scaleX(0.96) scaleY(1.01); }
  }

  @keyframes wing-flutter-2 {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    45%      { transform: scaleX(0.93) scaleY(1.02); }
    75%      { transform: scaleX(0.96) scaleY(1.01); }
  }

  @keyframes wing-flutter-3 {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    35%      { transform: scaleX(0.94) scaleY(1.02); }
    65%      { transform: scaleX(0.97) scaleY(1.01); }
  }

  @keyframes wing-flutter-4 {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    50%      { transform: scaleX(0.93) scaleY(1.02); }
    80%      { transform: scaleX(0.96) scaleY(1.01); }
  }

  @keyframes wing-flutter-5 {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    38%      { transform: scaleX(0.94) scaleY(1.02); }
    72%      { transform: scaleX(0.96) scaleY(1.01); }
  }

  /* ─── hero content ─── */
  .hero-content {
    position: relative;
    z-index: 10;
    padding: 2rem;
    max-width: 720px;
  }

  .hero-content h1 {
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #f5ede4;
    text-shadow: 0 4px 40px rgba(0,0,0,0.5);
    margin-bottom: 0.6rem;
    animation: text-glow 5s ease-in-out infinite;
  }

  @keyframes text-glow {
    0%, 100% { text-shadow: 0 4px 40px rgba(0,0,0,0.5); }
    50%      { text-shadow: 0 4px 80px rgba(245,237,228,0.25), 0 4px 40px rgba(0,0,0,0.5); }
  }

  .hero-content .sub {
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    color: rgba(245,237,228,0.65);
    letter-spacing: 0.4em;
    font-weight: 300;
    animation: sub-fade 5s ease-in-out infinite;
  }

  @keyframes sub-fade {
    0%, 100% { opacity: 0.65; }
    50%      { opacity: 0.85; }
  }

  .hero-content .scroll-hint {
    margin-top: 4rem;
    font-size: 0.75rem;
    color: rgba(245,237,228,0.35);
    letter-spacing: 0.2em;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.35; transform: translateY(0); }
    50%      { opacity: 0.7;  transform: translateY(4px); }
  }

  /* ─── divider ─── */
  .divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(155,183,212,0.25), transparent);
    margin: 0 10%;
  }

  /* ─── posts list ─── */
  .section-title {
    text-align: center;
    padding: 4rem 2rem 0;
  }

  .section-title h2 {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: #9bb7d4;
  }

  .section-title .line {
    width: 40px;
    height: 1px;
    background: #4a6a8a;
    margin: 0.8rem auto 2.5rem;
  }

  #post-list {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 2rem 5rem;
  }

  .post-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 2rem 2.2rem;
    margin-bottom: 1.6rem;
    backdrop-filter: blur(4px);
    transition: all 0.35s ease;
    cursor: pointer;
  }

  .post-card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(155,183,212,0.2);
    transform: translateY(-2px);
  }

  .post-card .meta {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 0.8rem;
    color: #6b7f96;
    margin-bottom: 0.6rem;
    letter-spacing: 0.05em;
  }

  .post-card .meta .tag {
    background: rgba(155,183,212,0.1);
    color: #9bb7d4;
    padding: 0.1rem 0.7rem;
    border-radius: 20px;
    font-size: 0.7rem;
  }

  .post-card h3 {
    font-size: 1.2rem;
    font-weight: 400;
    color: #e8eef5;
    margin-bottom: 0.5rem;
    letter-spacing: 0.04em;
  }

  .post-card p {
    font-size: 0.92rem;
    color: #889bb0;
    line-height: 1.7;
  }

  .post-card .read-more {
    display: inline-block;
    margin-top: 0.8rem;
    font-size: 0.82rem;
    color: #9bb7d4;
    letter-spacing: 0.05em;
    border-bottom: 1px solid transparent;
    pointer-events: none;
  }

  /* ─── article view ─── */
  .article-view {
    display: none;
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
  }

  .article-view.visible {
    display: block;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .article-view .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    color: #6b7f96;
    cursor: pointer;
    transition: color 0.25s;
    margin-bottom: 2rem;
    border: none;
    background: none;
    padding: 0;
    font-family: inherit;
  }

  .article-view .back-btn:hover { color: #9bb7d4; }

  .article-view .article-title {
    font-size: 1.8rem;
    font-weight: 300;
    color: #f5ede4;
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
  }

  .article-view .article-meta {
    font-size: 0.82rem;
    color: #6b7f96;
    margin-bottom: 2.5rem;
  }

  .article-body { font-size: 1rem; color: #c8d0da; line-height: 1.9; }

  .article-body h1, .article-body h2, .article-body h3 {
    color: #e8eef5;
    font-weight: 400;
    margin: 2rem 0 0.8rem;
    letter-spacing: 0.04em;
  }
  .article-body h1 { font-size: 1.6rem; }
  .article-body h2 { font-size: 1.35rem; }
  .article-body h3 { font-size: 1.15rem; }
  .article-body p { margin-bottom: 1.2rem; }
  .article-body a { color: #9bb7d4; text-decoration: none; border-bottom: 1px solid rgba(155,183,212,0.3); }
  .article-body a:hover { border-bottom-color: #9bb7d4; }
  .article-body blockquote {
    border-left: 2px solid rgba(155,183,212,0.25);
    padding-left: 1.2rem;
    margin: 1.5rem 0;
    color: #889bb0;
    font-style: italic;
  }
  .article-body code {
    font-family: "JetBrains Mono", "Fira Code", monospace;
    font-size: 0.88em;
    background: rgba(255,255,255,0.05);
    padding: 0.15em 0.5em;
    border-radius: 4px;
    color: #c8d0da;
  }
  .article-body pre {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 1.2rem 1.4rem;
    overflow-x: auto;
    margin: 1.5rem 0;
  }
  .article-body pre code { background: none; padding: 0; border-radius: 0; }
  .article-body img { max-width: 100%; border-radius: 8px; margin: 1.5rem 0; }
  .article-body hr { border: none; height: 1px; background: rgba(255,255,255,0.06); margin: 2rem 0; }
  .article-body ul, .article-body ol { margin: 1rem 0; padding-left: 1.5rem; }
  .article-body li { margin-bottom: 0.4rem; }
  .article-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
  .article-body th, .article-body td { border: 1px solid rgba(255,255,255,0.08); padding: 0.6rem 1rem; text-align: left; }
  .article-body th { background: rgba(255,255,255,0.04); color: #e8eef5; font-weight: 400; }

  /* ─── loading ─── */
  .loading {
    text-align: center;
    padding: 4rem 0;
    color: #6b7f96;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }

  /* ─── footer ─── */
  footer {
    text-align: center;
    padding: 2.5rem 2rem;
    font-size: 0.78rem;
    color: #3e5370;
    letter-spacing: 0.1em;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  @media (max-width: 600px) {
    .swan { display: none; }
    .post-card { padding: 1.5rem; }
    .hero-content h1 { letter-spacing: 0.2em; }
    .article-view .article-title { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<!-- ====== HERO ====== -->
<section class="hero">
  <div class="specks">
    <div class="speck"></div><div class="speck"></div><div class="speck"></div><div class="speck"></div><div class="speck"></div>
    <div class="speck"></div><div class="speck"></div><div class="speck"></div><div class="speck"></div><div class="speck"></div>
  </div>
  <div class="mist">
    <div class="mist-particle"></div><div class="mist-particle"></div><div class="mist-particle"></div>
    <div class="mist-particle"></div><div class="mist-particle"></div><div class="mist-particle"></div>
  </div>
  <div class="mountains">
    <div class="mountain-layer" style="height:70%;">
      <svg viewBox="0 0 1440 600" preserveAspectRatio="xMidYMax meet">
        <path d="M0,400 L80,340 L160,370 L260,290 L340,320 L410,260 L500,300 L580,230 L660,270 L740,200 L820,250 L900,180 L980,230 L1060,170 L1140,210 L1240,150 L1320,190 L1440,130 L1440,600 L0,600 Z" fill="#0f1729" opacity="0.9"/>
      </svg>
    </div>
    <div class="mountain-layer" style="height:65%;">
      <svg viewBox="0 0 1440 600" preserveAspectRatio="xMidYMax meet">
        <path d="M0,430 L100,370 L200,400 L320,310 L420,350 L510,280 L600,320 L700,250 L790,290 L890,220 L980,270 L1080,200 L1180,240 L1280,180 L1380,220 L1440,190 L1440,600 L0,600 Z" fill="#1b2a4a" opacity="0.85"/>
      </svg>
    </div>
    <div class="mountain-layer" style="height:58%;">
      <svg viewBox="0 0 1440 600" preserveAspectRatio="xMidYMax meet">
        <path d="M0,470 L120,400 L240,440 L350,360 L460,400 L560,330 L660,370 L760,300 L860,340 L960,280 L1060,320 L1160,260 L1260,300 L1360,240 L1440,270 L1440,600 L0,600 Z" fill="#2f4b6e" opacity="0.8"/>
      </svg>
    </div>
    <div class="mountain-layer" style="height:50%;">
      <svg viewBox="0 0 1440 600" preserveAspectRatio="xMidYMax meet">
        <path d="M0,500 L100,440 L220,480 L340,410 L440,450 L550,390 L650,430 L760,370 L860,410 L970,350 L1080,390 L1180,340 L1280,380 L1380,330 L1440,350 L1440,600 L0,600 Z" fill="#5b7da0" opacity="0.6"/>
      </svg>
    </div>
    <div class="mountain-layer" style="height:40%;">
      <svg viewBox="0 0 1440 600" preserveAspectRatio="xMidYMax meet">
        <path d="M0,540 L80,490 L180,520 L280,470 L380,500 L480,450 L580,480 L680,430 L780,460 L880,420 L980,450 L1080,400 L1180,430 L1280,390 L1380,420 L1440,400 L1440,600 L0,600 Z" fill="#9bb7d4" opacity="0.35"/>
      </svg>
    </div>
  </div>
  <div class="swans">
    <div class="swan swan-1">
      <svg viewBox="0 0 120 80" fill="none">
        <path d="M10,50 Q30,10 60,25 Q70,28 75,20 Q80,12 90,18 Q95,21 100,15 Q105,10 112,18 L108,22 Q102,18 98,22 Q93,28 88,26 Q80,22 75,28 Q68,35 60,32 Q40,22 20,48 Q15,52 10,50Z" fill="white" opacity="0.95"/>
        <ellipse cx="58" cy="30" rx="2" ry="1.5" fill="#1b2a4a"/>
        <path d="M60,32 Q65,36 62,40" stroke="#e8a020" stroke-width="1.2" fill="none"/>
      </svg>
    </div>

<!-- ====== POSTS ====== -->
<div class="section-title">
  <h2>最近的笔迹</h2>
  <div class="line"></div>
</div>

<div id="post-list"></div>

<!-- ====== ARTICLE VIEW ====== -->
<section id="article-view" class="article-view">
  <button class="back-btn" onclick="goBack()">← 返回列表</button>
  <h1 class="article-title" id="article-title"></h1>
  <p class="article-meta" id="article-meta"></p>
  <div class="article-body" id="article-body"></div>
</section>

<footer>
  <p>远 山 · 用光影记录山川</p>
</footer>

<script>
// ====== 文章配置 ======
// 加新文章就到这里加一条 ↓
const posts = [
  {
    id: 'wu-zhong-lun-kuo',
    title: '雾中的轮廓',
    date: '2026.04.20',
    tag: '山',
    summary: '清晨的远山被薄雾包裹，像是大地在呼吸。站在山脊上，看云层从脚下流过，时间变得很慢很慢。'
  },
  {
    id: 'tao-se-huang-hun',
    title: '桃色黄昏',
    date: '2026.04.12',
    tag: '光',
    summary: '日落时分，天际线被染成一片温柔的暖桃色。湖水倒映着最后的余晖，天鹅在远处缓缓飞过，画面静得只剩下风声。'
  },
  {
    id: 'dong-ri-shan-gu',
    title: '冬日山谷',
    date: '2026.04.05',
    tag: '静',
    summary: '山谷里什么声音都没有。雪覆盖了一切。只有偶尔从树枝上滑落的雪块，发出轻微的噗声。'
  },
  {
    id: 'tian-e-hang-xian',
    title: '天鹅的航线',
    date: '2026.03.28',
    tag: '飞',
    summary: '五只天鹅排成松散的队列，掠过深蓝色的山脊线。它们的翅膀在逆光中几乎透明，像是天空中的五个音符。'
  },
  {
    id: 'xing-kong-shan-ji',
    title: '星空下的山脊',
    date: '2026.03.19',
    tag: '夜',
    summary: '深夜独自爬到山顶，银河就在头顶倾泻而下。城市的光污染在这里全然消失，星星多得让人眼眶发热。'
  }
];

// ====== 渲染文章列表 ======
const listEl = document.getElementById('post-list');
const articleView = document.getElementById('article-view');
const articleTitle = document.getElementById('article-title');
const articleMeta = document.getElementById('article-meta');
const articleBody = document.getElementById('article-body');

posts.forEach((post, i) => {
  const card = document.createElement('article');
  card.className = 'post-card';
  card.innerHTML = `
    <div class="meta">
      <span>${post.date}</span>
      <span class="tag">${post.tag}</span>
    </div>
    <h3>${post.title}</h3>
    <p>${post.summary}</p>
    <span class="read-more">阅读全文 →</span>
  `;
  card.addEventListener('click', () => openArticle(i));
  listEl.appendChild(card);
});

// ====== 打开文章 ======
async function openArticle(i) {
  const post = posts[i];
  articleTitle.textContent = post.title;
  articleMeta.textContent = `${post.date} · ${post.tag}`;
  articleBody.innerHTML = '<div class="loading">加载中…</div>';

  listEl.style.display = 'none';
  articleView.classList.add('visible');
  window.scrollTo({ top: document.querySelector('.divider').offsetTop, behavior: 'smooth' });

  try {
    const res = await fetch(`posts/${post.id}.md`);
    const md = await res.text();
    articleBody.innerHTML = marked.parse(md);
  } catch (e) {
    articleBody.innerHTML = '<p style="color:#8a5a5a;">文章加载失败，请检查文件是否存在。</p>';
  }
}

function goBack() {
  articleView.classList.remove('visible');
  listEl.style.display = 'block';
  window.scrollTo({ top: document.querySelector('.divider').offsetTop, behavior: 'smooth' });
}
</script>
